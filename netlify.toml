# Redirect default index files to root
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

[[redirects]]
  from = "/index"
  to = "/"
  status = 301

[[redirects]]
  from = "/home"
  to = "/"
  status = 301

# Clean URLs rewrites for Stay site
[[redirects]]
  from = "/rooms"
  to = "/rooms.html"
  status = 200

[[redirects]]
  from = "/booking"
  to = "/booking.html"
  status = 200

[[redirects]]
  from = "/blog"
  to = "/blog.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login.html"
  status = 200

[build]
  publish = "."

[build.processing]
  skip_node_bundling = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true
