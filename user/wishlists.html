<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
    <title>Saved Wishlist | KPH Stay Guest App</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Tailwind CSS (Play CDN with JIT) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Global CSS -->
    <link rel="stylesheet" href="../assets/css/style.css?v=6">
</head>
<body class="guest-app-body bg-[#F8FAFC] text-[#0B0F19] overflow-x-hidden font-sans pt-20 pb-20 md:pb-12">

    <!-- Desktop Luxury Guest App Top Header -->
    <nav id="guest-app-navbar" class="fixed top-0 left-0 right-0 z-50 py-3 px-4 md:px-8 bg-[#070A12]/95 backdrop-blur-xl border-b border-white/10 shadow-2xl text-white flex items-center justify-between gap-4">
        <div class="flex items-center gap-3 shrink-0">
            <a href="index.html" class="flex items-center gap-2.5 hover:opacity-90 transition-opacity">
                <img src="../assets/images/logo.png" alt="KPH Stay Logo" class="h-9 w-auto object-contain">
                <div class="flex flex-col">
                    <span class="text-base font-black tracking-wider uppercase outfit leading-none text-white">KPH STAY</span>
                    <span class="text-[9px] text-[#C5A059] tracking-[0.25em] uppercase font-extrabold flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Guest Super App
                    </span>
                </div>
            </a>
        </div>

        <div class="hidden xl:flex items-center gap-1.5 bg-white/5 border border-white/10 p-1.5 rounded-2xl">
            <a href="index.html?tab=overview" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-hotel text-xs"></i> Explore Suites</a>
            <a href="trips.html" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-suitcase text-xs"></i> My Stays</a>
            <a href="wishlists.html" class="px-4 py-2 rounded-xl text-xs font-bold bg-[#C5A059] text-white shadow-md"><i class="fa-solid fa-heart text-xs text-rose-400"></i> Wishlist</a>
            <a href="notifications.html" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-bell text-xs"></i> Alerts</a>
            <a href="support.html" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-headset text-xs text-emerald-400"></i> Host Support</a>
            <a href="profile.html" class="px-4 py-2 rounded-xl text-xs font-semibold text-slate-300 hover:text-white hover:bg-white/10"><i class="fa-solid fa-user-shield text-xs"></i> Account</a>
        </div>

        <div class="flex items-center gap-3 shrink-0">
            <button onclick="KaghanDB.logout()" class="border border-white/20 text-white px-3.5 py-1.5 rounded-full hover:bg-rose-600 transition-all text-xs font-bold shrink-0">
                <i class="fa-solid fa-power-off"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content Container -->
    <main class="py-6 px-4 md:px-12 max-w-7xl mx-auto space-y-8">
        <div class="bg-gradient-to-r from-[#070A12] via-[#121826] to-[#070A12] rounded-3xl p-6 md:p-8 border border-white/10 shadow-2xl text-white flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
            <div>
                <span class="inline-flex items-center gap-2 text-rose-400 text-[10px] font-extrabold uppercase tracking-widest bg-rose-500/10 px-3 py-1 rounded-full border border-rose-500/20 mb-2">
                    <i class="fa-solid fa-heart text-xs"></i> Saved Favorites
                </span>
                <h1 class="text-2xl md:text-3xl font-bold outfit text-white">Saved Luxury Suites</h1>
                <p class="text-slate-400 text-xs mt-1 font-light">Your favorite resort apartments, pricing snapshots, and 1-click reservations.</p>
            </div>
            <a href="../rooms.html" class="bg-[#C5A059] text-slate-900 font-extrabold text-xs px-6 py-3 rounded-2xl hover:bg-white transition-all shadow-md flex items-center justify-center gap-2 shrink-0">
                <i class="fa-solid fa-compass text-xs"></i> Explore All Suites
            </a>
        </div>

        <!-- Wishlist Grid -->
        <div class="space-y-6">
            <div id="guest-wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loaded dynamically -->
                <div class="col-span-full text-center py-12 text-slate-400 text-xs font-light">
                    Loading saved wishlist...
                </div>
            </div>
        </div>
    </main>

    <!-- Mobile Floating Navigation Dock -->
    <nav class="guest-app-dock md:hidden flex justify-around items-center">
        <a href="index.html?tab=overview" class="dock-item">
            <i class="fa-solid fa-hotel"></i>
            <span>Explore</span>
        </a>
        <a href="trips.html" class="dock-item">
            <i class="fa-solid fa-suitcase"></i>
            <span>Stays</span>
        </a>
        <a href="support.html" class="dock-item">
            <i class="fa-solid fa-comments text-emerald-400"></i>
            <span>Host Chat</span>
        </a>
        <a href="wishlists.html" class="dock-item active">
            <i class="fa-solid fa-heart text-rose-400"></i>
            <span>Wishlist</span>
        </a>
        <a href="profile.html" class="dock-item">
            <i class="fa-solid fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="../assets/js/shared.js?v=4"></script>
    <script src="../assets/js/users.js"></script>
    <script src="../assets/js/newsletter.js"></script>
    <script src="../assets/js/user/bookings.js"></script>
    <script src="../assets/js/user/reviews.js"></script>
    <script src="../assets/js/user/profile.js"></script>
    <script src="../assets/js/messaging.js"></script>
    <script src="../assets/js/user/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof renderGuestWishlists === 'function') {
                renderGuestWishlists();
            }
        });
    </script>
</body>
</html>
